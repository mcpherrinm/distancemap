<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Region Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #03060c;
    --bg-1: #07111d;
    --bg-2: #0c1a2b;
    --line: #1a2f4d;
    --line-soft: #14233a;
    --amber: #ffb347;
    --amber-glow: #ff7a00;
    --cyan: #5ee0ff;
    --cyan-soft: #2a7fa3;
    --ink: #d8e5f3;
    --ink-dim: #a3b9d4;
    --ink-fade: #84a0bf;
    --warn: #ff5577;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--bg-0);
    color: var(--ink);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 13px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }
  body { display: flex; }
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(0deg,
      rgba(255,255,255,0.012) 0, rgba(255,255,255,0.012) 1px,
      transparent 1px, transparent 3px);
    z-index: 100;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%);
    z-index: 99;
  }

  #map-container {
    position: relative;
    flex: 1 1 auto;
    min-width: 0;
    z-index: 1;
    background:
      radial-gradient(ellipse at center, rgba(20,40,70,0.4) 0%, rgba(3,6,12,0) 70%),
      var(--bg-0);
  }
  #map-svg {
    width: 100%; height: 100%;
    display: block;
    cursor: grab;
  }
  #map-svg:active { cursor: grabbing; }

  /* Strokes inside the zoom-root are screen-space — they hold their CSS
     stroke-width regardless of zoom, instead of being scaled by the parent
     transform. This keeps lines, dashes, and text outlines visually stable
     across the entire zoom range. Don't try to counter-scale stroke-width
     in the zoom handler — stylesheet rules silently override
     `selection.attr('stroke-width')` per the SVG 2 cascade. */
  #zoom-root * { vector-effect: non-scaling-stroke; }

  .sphere-bg {
    fill: rgba(8, 18, 32, 0.6);
    stroke: var(--line);
    stroke-width: 1;
  }
  .graticule {
    fill: none;
    stroke: var(--line);
    stroke-width: 0.5;
    stroke-opacity: 0.55;
    stroke-dasharray: 1 3;
  }
  .graticule-equator { stroke-opacity: 0.85; stroke-dasharray: none; stroke: #2a5078; }
  .land {
    fill: rgba(20, 38, 61, 0.55);
    stroke: var(--cyan);
    stroke-width: 0.6;
    stroke-opacity: 0.45;
  }
  .border-country {
    fill: none;
    stroke: var(--cyan);
    stroke-width: 0.55;
    stroke-opacity: 0.75;
  }
  .border-state {
    fill: none;
    stroke: var(--cyan-soft);
    stroke-width: 0.35;
    stroke-opacity: 0.6;
    stroke-dasharray: 2 2;
  }

  .arc {
    fill: none;
    stroke: #fff2dd;
    stroke-width: 1;
    stroke-opacity: 0.18;
    pointer-events: stroke;
    cursor: pointer;
  }
  .arc:hover { stroke-opacity: 0.95; stroke-width: 1.6; }

  .arc-label {
    fill: var(--amber);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    paint-order: stroke;
    stroke: rgba(3,6,12,0.95);
    stroke-width: 3;
    stroke-linejoin: round;
    text-anchor: middle;
    pointer-events: none;
    letter-spacing: 0.05em;
  }

  .cluster-label {
    fill: var(--cyan);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    paint-order: stroke;
    stroke: rgba(3,6,12,0.95);
    stroke-width: 3;
    stroke-linejoin: round;
    text-anchor: middle;
    pointer-events: none;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .cluster-buffer {
    fill: rgba(94,224,255,0.03);
    stroke: var(--cyan);
    stroke-width: 0.8;
    stroke-opacity: 0.55;
    stroke-dasharray: 4 3;
    pointer-events: all;
    cursor: pointer;
    transition: stroke-opacity 0.12s, fill 0.12s;
  }
  .cluster-buffer:hover {
    stroke-opacity: 0.95;
    fill: rgba(94,224,255,0.09);
  }

  .point-dot {
    fill: var(--amber);
    stroke: var(--amber-glow);
    stroke-width: 0.5;
    pointer-events: all;
    cursor: pointer;
  }
  .point-halo {
    fill: var(--amber-glow);
    fill-opacity: 0.35;
    pointer-events: none;
  }

  aside {
    position: relative;
    flex: 0 0 360px;
    width: 360px;
    height: 100vh;
    z-index: 10;
    background: linear-gradient(180deg, rgba(7,17,29,0.96), rgba(3,6,12,0.96));
    border-left: 1px solid var(--line);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  aside::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 28px;
    background: linear-gradient(180deg, rgba(255,179,71,0.06), transparent);
    pointer-events: none;
  }
  .panel-body { flex: 1; overflow-y: auto; padding: 16px; }
  .panel-body::-webkit-scrollbar { width: 6px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--line); }

  .drop {
    display: block;
    border: 1px dashed var(--line);
    background: rgba(94,224,255,0.025);
    padding: 22px 14px; text-align: center; cursor: pointer;
    transition: all 0.18s ease; position: relative;
  }
  .drop:hover, .drop.over {
    border-color: var(--amber);
    background: rgba(255,179,71,0.06);
  }
  .drop .icon {
    font-family: 'Major Mono Display', monospace;
    font-size: 32px; color: var(--amber); line-height: 1;
    margin-bottom: 10px; text-shadow: 0 0 14px var(--amber-glow);
  }
  .drop .lab {
    font-size: 11px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--ink);
  }
  .drop .hint {
    font-size: 10px; color: var(--ink-fade);
    margin-top: 6px; letter-spacing: 0.05em;
  }
  .drop input[type=file] { display: none; }

  .proj-switch { margin-top: 16px; }
  .proj-switch .lbl {
    font-size: 9px; letter-spacing: 0.3em;
    color: var(--ink-fade); text-transform: uppercase;
    margin-bottom: 6px;
  }
  .proj-row {
    display: flex;
    gap: 4px;
    align-items: stretch;
    margin-top: 6px;
  }
  .proj-select-wrap {
    position: relative;
    flex: 1;
    min-width: 0;
  }
  .proj-nav { display: flex; gap: 2px; }
  .proj-nav-btn {
    width: 22px;
    background: var(--bg-1);
    color: var(--cyan);
    border: 1px solid var(--line);
    font-family: inherit;
    font-size: 11px;
    line-height: 1;
    cursor: pointer;
    padding: 0;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }
  .proj-nav-btn:hover { border-color: var(--cyan-soft); color: var(--ink); }
  .proj-nav-btn:active { background: rgba(94,224,255,0.1); }
  .proj-nav-btn:focus { outline: none; border-color: var(--amber); color: var(--amber); }
  .proj-select {
    width: 100%;
    appearance: none;
    -webkit-appearance: none;
    background: var(--bg-1);
    color: var(--ink);
    border: 1px solid var(--line);
    padding: 9px 28px 9px 10px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    outline: none;
    transition: border-color 0.15s, color 0.15s;
  }
  .proj-select:hover { border-color: var(--cyan-soft); }
  .proj-select:focus {
    border-color: var(--amber);
    color: var(--amber);
  }
  .proj-select optgroup {
    font-style: normal;
    font-weight: 700;
    color: var(--cyan);
    background: var(--bg-0);
    letter-spacing: 0.08em;
  }
  .proj-select option {
    color: var(--ink);
    background: var(--bg-1);
    font-weight: 400;
    padding: 4px 0;
  }
  .proj-select-arrow {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--cyan);
    font-size: 12px;
    pointer-events: none;
  }

  .controls {
    margin-top: 16px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .ctrl-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 10px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--ink-dim);
  }
  .toggle {
    width: 34px; height: 16px;
    background: var(--bg-2); border: 1px solid var(--line);
    position: relative; cursor: pointer; transition: all 0.15s;
  }
  .toggle::after {
    content: ''; position: absolute; top: 1px; left: 1px;
    width: 12px; height: 12px;
    background: var(--ink-fade); transition: all 0.15s;
  }
  .toggle.on { background: rgba(255,179,71,0.15); border-color: var(--amber); }
  .toggle.on::after {
    left: 19px; background: var(--amber);
    box-shadow: 0 0 6px var(--amber-glow);
  }

  .rot-section { margin-top: 16px; }
  .rot-head {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--ink-dim); margin-bottom: 8px;
  }
  .rot-head .hint {
    font-size: 9px; letter-spacing: 0.18em; color: var(--ink-fade);
    text-transform: none;
  }
  .rot-row {
    display: grid;
    grid-template-columns: 56px 1fr 44px;
    gap: 8px; align-items: center;
    font-size: 10px; letter-spacing: 0.18em;
    color: var(--ink-dim);
    padding: 2px 0;
  }
  .rot-row .lab { text-transform: uppercase; }
  .rot-row .val {
    color: var(--amber); font-variant-numeric: tabular-nums;
    text-align: right; font-size: 10px; letter-spacing: 0;
  }
  .rot-row input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 2px; padding: 0; margin: 0;
    background: var(--line); cursor: pointer;
    outline: none;
  }
  .rot-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 10px; height: 14px;
    background: var(--cyan); border: 1px solid var(--cyan-soft);
    cursor: grab;
  }
  .rot-row input[type=range]::-moz-range-thumb {
    width: 10px; height: 14px;
    background: var(--cyan); border: 1px solid var(--cyan-soft);
    cursor: grab; border-radius: 0;
  }
  .rot-row input[type=range]:focus::-webkit-slider-thumb {
    background: var(--amber); border-color: var(--amber);
    box-shadow: 0 0 6px var(--amber-glow);
  }
  .rot-row input[type=range]:focus::-moz-range-thumb {
    background: var(--amber); border-color: var(--amber);
    box-shadow: 0 0 6px var(--amber-glow);
  }

  .sources-header {
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 4px;
    font-size: 10px;
  }
  .source-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 8px;
    align-items: center;
    padding: 3px 0;
  }
  .source-name {
    color: var(--ink);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }
  .source-count {
    color: var(--amber);
    font-variant-numeric: tabular-nums;
    font-size: 10px;
  }
  .source-del {
    background: transparent;
    border: none;
    padding: 2px 4px;
    margin: 0 -4px 0 0;
    color: var(--ink-fade);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    border-radius: 2px;
    transition: color 0.12s, background 0.12s;
  }
  .source-del:hover {
    color: var(--warn);
    background: rgba(255,90,90,0.10);
  }
  .source-del:focus { outline: none; color: var(--warn); }

  .section-title {
    margin-top: 22px;
    font-size: 9px; letter-spacing: 0.32em;
    color: var(--ink-fade); text-transform: uppercase;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--line-soft);
    display: flex; justify-content: space-between;
  }
  .cluster-list { margin-top: 8px; }
  .cluster-item {
    display: grid; grid-template-columns: 22px 1fr auto;
    gap: 10px; padding: 7px 4px;
    border-bottom: 1px solid var(--line-soft);
    cursor: pointer; transition: background 0.12s;
    align-items: center;
  }
  .cluster-item:hover { background: rgba(94,224,255,0.05); }
  .cluster-item .num {
    font-family: 'Major Mono Display', monospace;
    color: var(--cyan); font-size: 11px;
  }
  .cluster-item .meta { font-size: 10px; color: var(--ink); }
  .cluster-item .meta .coord {
    color: var(--ink-fade); font-size: 9px; margin-top: 1px;
  }
  .cluster-item .count {
    font-size: 11px; color: var(--amber);
    font-variant-numeric: tabular-nums;
  }
  .cluster-name {
    display: inline-block;
    cursor: text;
    outline: none;
    border-bottom: 1px dashed transparent;
    padding: 0 2px;
    margin: 0 -2px;
    transition: border-color 0.12s, background 0.12s;
    max-width: 220px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    vertical-align: bottom;
  }
  .cluster-item:hover .cluster-name {
    border-bottom-color: var(--ink-fade);
  }
  .cluster-name:focus {
    border-bottom-color: var(--amber);
    background: rgba(255,179,71,0.10);
    color: var(--amber);
    white-space: normal;
    overflow: visible;
    max-width: none;
  }
  .empty {
    color: var(--ink-fade); font-size: 11px;
    text-align: center; padding: 20px 0;
    letter-spacing: 0.05em;
  }

  #readout {
    position: fixed; pointer-events: none; z-index: 20;
    padding: 6px 10px;
    background: rgba(3,6,12,0.92);
    border: 1px solid var(--amber);
    color: var(--ink); font-size: 11px;
    letter-spacing: 0.05em;
    transform: translate(12px, 12px);
    opacity: 0; transition: opacity 0.1s;
    box-shadow: 0 0 20px rgba(255,122,0,0.2);
    max-width: 380px;
  }
  #readout.show { opacity: 1; }
  #readout .name { color: var(--amber); margin-bottom: 2px; }
  #readout .row { color: var(--ink-dim); font-size: 10px; }
  #readout .kv {
    display: grid; grid-template-columns: minmax(0, auto) 1fr;
    gap: 0 10px; font-size: 10px; margin-top: 3px;
    max-height: 60vh; overflow: hidden;
  }
  #readout .kv .k { color: var(--cyan-soft); white-space: nowrap; }
  #readout .kv .v { color: var(--ink); word-break: break-word; }

  .toast {
    position: fixed; top: 78px; left: 50%;
    transform: translateX(-50%); z-index: 30;
    padding: 8px 16px;
    background: rgba(3,6,12,0.95);
    border: 1px solid var(--amber);
    font-size: 10px; letter-spacing: 0.25em;
    text-transform: uppercase; color: var(--amber);
    opacity: 0; transition: opacity 0.25s;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 720px) {
    body { flex-direction: column; }
    aside {
      width: 100%; flex: 0 0 50vh; height: 50vh;
      border-left: none; border-top: 1px solid var(--line);
    }
  }
</style>
</head>
<body>

<div id="map-container">
  <svg id="map-svg" preserveAspectRatio="xMidYMid meet">
    <g id="zoom-root">
      <path id="sphere" class="sphere-bg" />
      <path id="graticule-eq" class="graticule graticule-equator" />
      <path id="graticule" class="graticule" />
      <g id="land-layer"></g>
      <g id="state-border-layer"></g>
      <g id="country-border-layer"></g>
      <g id="arc-layer"></g>
      <g id="cluster-layer"></g>
      <g id="point-layer"></g>
      <g id="arc-label-layer"></g>
      <g id="cluster-label-layer"></g>
    </g>
  </svg>
</div>

<aside>
  <div class="panel-body">
    <label class="drop" id="drop">
      <div class="icon">⤓</div>
      <div class="lab">Drop OSM file(s)</div>
      <div class="hint">Overpass JSON or GeoJSON · multi-select OK</div>
      <input type="file" id="file" multiple accept=".json,.geojson,application/json,application/geo+json"/>
    </label>

    <div class="proj-switch">
      <div class="lbl">Projection</div>
      <div class="proj-row">
        <div class="proj-select-wrap">
          <select id="proj-select" class="proj-select"></select>
          <span class="proj-select-arrow">▾</span>
        </div>
        <div class="proj-nav">
          <button id="proj-prev" class="proj-nav-btn" title="Previous projection" aria-label="Previous projection">↓</button>
          <button id="proj-rand" class="proj-nav-btn" title="Random projection" aria-label="Random projection">?</button>
          <button id="proj-next" class="proj-nav-btn" title="Next projection" aria-label="Next projection">↑</button>
        </div>
      </div>
    </div>

    <div class="rot-section">
      <div class="rot-head">
        <span>Rotation</span>
        <div class="proj-nav">
          <button id="rot-rand"  class="proj-nav-btn" title="Randomize rotation" aria-label="Randomize rotation">?</button>
          <button id="rot-reset" class="proj-nav-btn" title="Reset rotation"     aria-label="Reset rotation">⟲</button>
        </div>
      </div>
      <div class="rot-row">
        <span class="lab">λ yaw</span>
        <input type="range" id="rot-l" min="-180" max="180" step="1" value="0">
        <span class="val" id="rot-l-val">0°</span>
      </div>
      <div class="rot-row">
        <span class="lab">φ pitch</span>
        <input type="range" id="rot-p" min="-90" max="90" step="1" value="0">
        <span class="val" id="rot-p-val">0°</span>
      </div>
      <div class="rot-row">
        <span class="lab">γ roll</span>
        <input type="range" id="rot-g" min="-180" max="180" step="1" value="0">
        <span class="val" id="rot-g-val">0°</span>
      </div>
      <div class="rot-head" style="margin: 6px 0 0;">
        <span class="hint">alt-drag map to rotate</span>
      </div>
    </div>

    <div class="controls">
      <div class="ctrl-row">
        <span>Distances</span>
        <div class="toggle on" id="t-distances"></div>
      </div>
      <div class="ctrl-row">
        <span>Region Labels</span>
        <div class="toggle on" id="t-region-labels"></div>
      </div>
      <div class="ctrl-row">
        <span>Continents</span>
        <div class="toggle on" id="t-continents"></div>
      </div>
      <div class="ctrl-row">
        <span>Borders</span>
        <div class="toggle on" id="t-borders"></div>
      </div>
      <div class="ctrl-row">
        <span>Reset View</span>
        <button id="btn-reset-view" style="
          background: transparent; color: var(--cyan); border: 1px solid var(--cyan);
          font-family: inherit; font-size: 9px; letter-spacing: 0.25em;
          text-transform: uppercase; padding: 3px 10px; cursor: pointer;
        ">Recenter</button>
      </div>
      <div class="ctrl-row">
        <span>Export</span>
        <button id="btn-export-svg" style="
          background: transparent; color: var(--amber); border: 1px solid var(--amber);
          font-family: inherit; font-size: 9px; letter-spacing: 0.25em;
          text-transform: uppercase; padding: 3px 10px; cursor: pointer;
        ">Save SVG</button>
      </div>
    </div>

    <div id="loaded-files" style="margin-top: 12px; font-size: 10px; color: var(--ink-fade);"></div>

    <div class="section-title">
      <span>Regions</span>
      <span id="region-count">—</span>
    </div>
    <div class="cluster-list" id="cluster-list">
      <div class="empty">awaiting transmission…</div>
    </div>
  </div>
</aside>

<div id="readout"></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-geo-projection@4.0.0/dist/d3-geo-projection.min.js"></script>

<script>
/* =====================================================================
   REGION MAP · 2D
   SVG + d3-geo. Projections: Mercator, Equal Earth, Azimuthal Equidistant, Dymaxion.
   ===================================================================== */

(async function main() {

const EARTH_KM   = 6371;
const CLUSTER_KM = 100;

const state = {
  points: [],
  clusters: [],
  pairs: [],
  showDistances: true,
  showRegionLabels: true,
  showContinents: true,
  showBorders: true,
  projectionName: 'geoRobinson',
  // [λ, φ, γ] passed straight to projection.rotate(). Seeded from each
  // projection's natural orientation when the projection is swapped, then
  // adjusted by the rotation sliders or alt-drag on the map.
  rotation: [0, 0, 0],
  landGeo: null,
  countriesGeo: null,
  statesGeo: null
};

const wrap180 = (x) => ((x + 180) % 360 + 360) % 360 - 180;
const clampPhi = (x) => Math.max(-90, Math.min(90, x));
const loadedFiles = [];

const mapContainer = document.getElementById('map-container');
const svg        = d3.select('#map-svg');
const zoomRoot   = d3.select('#zoom-root');
const sphereEl   = d3.select('#sphere');
const gratEl     = d3.select('#graticule');
const gratEqEl   = d3.select('#graticule-eq');
const landLayer  = d3.select('#land-layer');

// Projections that can't represent the full sphere — must fit a clipped polygon
const NEEDS_CLIPPED_FIT = new Set([
  'geoMercator',
  'geoTransverseMercator',
  'geoCylindricalStereographic',
  'geoMiller',
  'geoCylindricalEqualArea',
]);

function buildProjection(key) {
  let proj = null;
  if (typeof d3[key] === 'function') {
    try { proj = d3[key](); } catch (e) { /* fall through */ }
  }
  if (!proj || typeof proj.scale !== 'function') {
    proj = d3.geoMercator();
    state.projectionName = 'geoMercator';
  }
  // Per-projection tweaks for usability
  if (key === 'geoAzimuthalEquidistant') {
    proj.rotate([0, -90]).clipAngle(180 - 1e-3);
  } else if (key === 'geoAzimuthalEqualArea' ||
             key === 'geoStereographic' ||
             key === 'geoOrthographic') {
    if (proj.clipAngle) proj.clipAngle(90 - 1e-3);
  } else if (key === 'geoGnomonic') {
    proj.clipAngle(60);
  } else if (key === 'geoSatellite') {
    proj.distance(1.4).tilt(0).rotate([0, 0]).clipAngle(45);
  }
  if (proj.precision) proj.precision(0.5);
  return proj;
}

// Capture a freshly-built projection's natural rotation (geoAzimuthalEquidistant
// looks down on the north pole, geoSatellite is normalized, etc.) and treat
// it as the user's current rotation. From there, sliders and alt-drag adjust.
function adoptProjection(key) {
  state.projectionName = key;
  projection = buildProjection(key);
  const r = projection.rotate ? projection.rotate() : [0, 0, 0];
  state.rotation = [r[0] || 0, r[1] || 0, r[2] || 0];
  pathGen = d3.geoPath(projection);
}

let projection = buildProjection(state.projectionName);

function fitProjection() {
  const w = mapContainer.clientWidth || innerWidth;
  const h = mapContainer.clientHeight || innerHeight;
  const ext = [[40, 80], [w-40, h-80]];
  const sphere  = { type: 'Sphere' };
  const clipped = {
    type: 'Polygon',
    coordinates: [[[-180, -82], [180, -82], [180, 82], [-180, 82], [-180, -82]]]
  };
  try {
    projection.fitExtent(ext, NEEDS_CLIPPED_FIT.has(state.projectionName) ? clipped : sphere);
  } catch (e) {
    try { projection.fitExtent(ext, clipped); }
    catch (e2) { /* leave projection at default */ }
  }
  // Validate; if scale went infinite/NaN, retry with clipped polygon
  const k = projection.scale ? projection.scale() : 0;
  if (!isFinite(k) || k <= 0) {
    try { projection.fitExtent(ext, clipped); } catch (e) { /* ignore */ }
  }
  pathGen = d3.geoPath(projection);
}

// Push state.rotation into the projection and re-render paths. Skips
// fitProjection so dragging a slider (or alt-dragging the map) doesn't
// re-scale the canvas underfoot — clipped projections (Mercator etc.)
// otherwise breathe in and out as rotation changes their projected bounds.
function applyRotation() {
  projection.rotate(state.rotation);
  rerenderProjection();
}

function syncRotationControls() {
  // Sliders are clamped to [-180,180] / [-90,90]; if the projection's natural
  // rotation lies outside (e.g. anything wrapped past ±180), normalize first.
  state.rotation = [
    wrap180(state.rotation[0]),
    clampPhi(state.rotation[1]),
    wrap180(state.rotation[2])
  ];
  rotInputs.l.value = Math.round(state.rotation[0]);
  rotInputs.p.value = Math.round(state.rotation[1]);
  rotInputs.g.value = Math.round(state.rotation[2]);

  rotVals.p.textContent = `${Math.round(state.rotation[1])}°`;
  rotVals.g.textContent = `${Math.round(state.rotation[2])}°`;

// Alt-drag rotates the globe in λ (yaw) and φ (pitch). Roll is slider-only.
// Sensitivity: ~0.5° per pixel — a full panel-width drag spins the globe
// roughly once around. d3.drag's filter coexists with the zoom behavior
// because the zoom filter explicitly excludes alt-key events.
const rotateDrag = d3.drag()
  .filter((event) => event.altKey && !event.button)
  .on('start', (event) => { event.sourceEvent.preventDefault(); })
  .on('drag', (event) => {
    state.rotation[0] = wrap180(state.rotation[0] + event.dx * 0.5);
    state.rotation[1] = clampPhi(state.rotation[1] - event.dy * 0.5);
    syncRotationControls();
    applyRotation();
  });
svg.call(rotateDrag);

function exportSVG() {
  const w = mapContainer.clientWidth || innerWidth;
  const h = mapContainer.clientHeight || innerHeight;
  const cloned = svg.node().cloneNode(true);
  cloned.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  cloned.setAttribute('xmlns:xlink', 'http://www.w3.org/1999/xlink');
  cloned.setAttribute('width', w);
  cloned.setAttribute('height', h);
  cloned.setAttribute('viewBox', `0 0 ${w} ${h}`);
  // Remove the cursor inline-style/class noise that's irrelevant in a static file
  cloned.removeAttribute('style');

  // Background rect — the live page paints this via #map-container CSS,
  // which won't follow the SVG out the door.
  const SVG_NS = 'http://www.w3.org/2000/svg';
  const bg = document.createElementNS(SVG_NS, 'rect');
  bg.setAttribute('width', '100%');
  bg.setAttribute('height', '100%');
  bg.setAttribute('fill', '#03060c');
  cloned.insertBefore(bg, cloned.firstChild);

  const styleEl = document.createElementNS(SVG_NS, 'style');
  styleEl.textContent = EXPORT_CSS;
  cloned.insertBefore(styleEl, cloned.firstChild);

  const xml = '<?xml version="1.0" encoding="UTF-8"?>\n' +
              new XMLSerializer().serializeToString(cloned);
  const blob = new Blob([xml], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  a.href = url;
  a.download = `region-map-${stamp}.svg`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast(`exported ${a.download}`);
}

document.getElementById('btn-export-svg').addEventListener('click', exportSVG);

async function loadGeo() {
  // countries-110m.json bundles both `land` (for the fill layer) and
  // `countries` (for borders) in a single TopoJSON.
  fetchJSON('./countries-110m.json').then(topo => {
    if (!topo) return;
    state.landGeo = topoToGeoJSON(topo, 'land');
    state.countriesGeo = topoToGeoJSON(topo, 'countries');
    renderLand();
    renderCountryBorders();
  });
  // states-50m.json is a stripped Natural Earth admin_1 50m FeatureCollection;
  // covers subnational data for US, Canada, Russia, China, India, Indonesia,
  // Brazil, Australia, South Africa. Other countries have none.
  fetchJSON('./states-50m.json').then(geo => {
    if (!geo) return;
    state.statesGeo = geo;
    renderStateBorders();
  });
}

async function fetchJSON(url) {
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch(e) {
    console.error(`fetch ${url} failed`, e);
    return null;
  }
}

function topoToGeoJSON(topo, objectName) {
  const arcs = topo.arcs;
  const tx = topo.transform;
  const obj = topo.objects && topo.objects[objectName];
  if (!obj) return null;
  function decodeArc(idx) {
    const reverse = idx < 0;
    if (reverse) idx = ~idx;
    const arc = arcs[idx];
    let x = 0, y = 0;
    const out = [];
    for (let i=0; i<arc.length; i++) {
      x += arc[i][0]; y += arc[i][1];
      out.push([ x*tx.scale[0]+tx.translate[0], y*tx.scale[1]+tx.translate[1] ]);
    }
    return reverse ? out.reverse() : out;
  }
  function ring(arcIdxs) {
    const pts = [];
    for (let i=0; i<arcIdxs.length; i++) {
      const seg = decodeArc(arcIdxs[i]);
      if (i>0) seg.shift();
      pts.push(...seg);
    }
    return pts;
  }
  function geomToGeoJSON(g) {
    if (g.type === 'Polygon') return { type:'Polygon', coordinates: g.arcs.map(ring) };
    if (g.type === 'MultiPolygon') return { type:'MultiPolygon', coordinates: g.arcs.map(p=>p.map(ring)) };
    return null;
  }
  const features = [];
  if (obj.type === 'GeometryCollection') {
    for (const g of obj.geometries) {
      const decoded = geomToGeoJSON(g);
      if (decoded) features.push({ type:'Feature', geometry: decoded, properties: g.properties || {} });
    }
  } else {
    const decoded = geomToGeoJSON(obj);
    if (decoded) features.push({ type:'Feature', geometry: decoded, properties: obj.properties || {} });
  }
  return { type:'FeatureCollection', features };
}

/* ---------- DATA PARSING ---------- */
function parseSource(json) {
  const pts = [];
  if (json && json.elements && Array.isArray(json.elements)) {
    for (const el of json.elements) {
      let lat, lon;
      if (el.type === 'node' && el.lat != null) { lat = el.lat; lon = el.lon; }
      else if (el.center) { lat = el.center.lat; lon = el.center.lon; }
      else continue;
      const tags = el.tags || {};
      pts.push({
        lat, lon,
        name: tags.name || tags['name:en'] || tags.operator || `OSM ${el.type} ${el.id}`,
        tags
      });
    }
  } else if (json && json.type === 'FeatureCollection' && Array.isArray(json.features)) {
    for (const f of json.features) {
      if (!f.geometry) continue;
      let lat, lon;
      const g = f.geometry;
      if (g.type === 'Point') {
        [lon, lat] = g.coordinates;
      } else if (g.type === 'Polygon') {
        const ring = g.coordinates[0]; if (!ring || !ring.length) continue;
        let sx=0, sy=0; for (const c of ring) { sx+=c[0]; sy+=c[1]; }
        lon = sx/ring.length; lat = sy/ring.length;
      } else if (g.type === 'MultiPolygon') {
        const ring = g.coordinates[0] && g.coordinates[0][0];
        if (!ring || !ring.length) continue;
        let sx=0, sy=0; for (const c of ring) { sx+=c[0]; sy+=c[1]; }
        lon = sx/ring.length; lat = sy/ring.length;
      } else continue;
      const props = f.properties || {};
      pts.push({
        lat, lon,
        name: props.name || props['name:en'] || props.operator || `Feature ${f.id||''}`,
        tags: props
      });
    }
  }
  return pts;
}

/* ---------- MATH ---------- */
function haversineKm(a, b) {
  const R = EARTH_KM;
  const dLat = (b.lat - a.lat) * Math.PI / 180;
  const dLon = (b.lon - a.lon) * Math.PI / 180;
  const x = Math.sin(dLat/2)**2 +
            Math.cos(a.lat*Math.PI/180) * Math.cos(b.lat*Math.PI/180) *
            Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.min(1, Math.sqrt(x)));
}
function geoMidpoint(a, b) {
  const φ1 = a.lat*Math.PI/180, λ1 = a.lon*Math.PI/180;
  const φ2 = b.lat*Math.PI/180, λ2 = b.lon*Math.PI/180;
  const Δλ = λ2 - λ1;
  const Bx = Math.cos(φ2) * Math.cos(Δλ);
  const By = Math.cos(φ2) * Math.sin(Δλ);
  const φ3 = Math.atan2(Math.sin(φ1)+Math.sin(φ2),
                         Math.sqrt((Math.cos(φ1)+Bx)**2 + By*By));
  const λ3 = λ1 + Math.atan2(By, Math.cos(φ1)+Bx);
  return { lat: φ3*180/Math.PI, lon: ((λ3*180/Math.PI)+540)%360 - 180 };
}
function formatKm(km) {
  if (km < 100) return km.toFixed(0)+' km';
  if (km < 1000) return Math.round(km)+' km';
  return (km/1000).toFixed(km<10000?2:1)+'k km';
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- CLUSTERING ---------- */
function clusterByDistance(points, maxKm) {
  const n = points.length;
  const parent = Array.from({length:n}, (_,i)=>i);
  const find = i => { while (parent[i]!==i) { parent[i]=parent[parent[i]]; i=parent[i]; } return i; };
  const union = (i,j) => { parent[find(i)] = find(j); };
  for (let i=0; i<n; i++) {
    for (let j=i+1; j<n; j++) {
      if (haversineKm(points[i], points[j]) <= maxKm) union(i,j);
    }
  }
  const buckets = new Map();
  for (let i=0; i<n; i++) {
    const r = find(i);
    if (!buckets.has(r)) buckets.set(r, []);
    buckets.get(r).push(points[i]);
  }
  const clusters = [];
  for (const pts of buckets.values()) {
    let x=0,y=0,z=0;
    for (const p of pts) {
      const φ = p.lat*Math.PI/180, λ = p.lon*Math.PI/180;
      x += Math.cos(φ)*Math.cos(λ);
      y += Math.cos(φ)*Math.sin(λ);
      z += Math.sin(φ);
    }
    const len = Math.sqrt(x*x+y*y+z*z) || 1;
    x/=len; y/=len; z/=len;
    const lat = Math.asin(Math.max(-1, Math.min(1, z))) * 180/Math.PI;
    const lon = Math.atan2(y, x) * 180/Math.PI;
    const center = { lat, lon };
    let maxD = 0;
    for (const p of pts) maxD = Math.max(maxD, haversineKm(center, p));
    clusters.push({
      center, points: pts,
      name: regionLabel(center, pts),
      radiusKm: Math.max(60, Math.min(maxD + 30, maxKm))
    });
  }
  clusters.sort((a,b) => b.points.length - a.points.length);
  return clusters;
}

function regionLabel({lat, lon}, pts) {
  for (const p of pts) {
    const t = p.tags || {};
    if (t.region) return t.region;
  }
  for (const p of pts) {
    const t = p.tags || {};
    if (t['addr:city']) return t['addr:city'];
    if (t['addr:state']) return t['addr:state'];
    if (t['addr:country']) return t['addr:country'];
  }
  const ns = lat >= 0 ? 'N' : 'S';
  const ew = lon >= 0 ? 'E' : 'W';
  return `${Math.abs(lat).toFixed(1)}°${ns} ${Math.abs(lon).toFixed(1)}°${ew}`;
}

function rebuildClusters() {
  state.clusters = clusterByDistance(state.points, CLUSTER_KM);
  state.pairs = [];
  for (let i=0; i<state.clusters.length; i++) {
    for (let j=i+1; j<state.clusters.length; j++) {
      state.pairs.push({
        i, j,
        distKm: haversineKm(state.clusters[i].center, state.clusters[j].center)
      });
    }
  }
}

/* ---------- RENDER ---------- */
function renderAll() {
  fitProjection();
  rerenderProjection();
  svg.call(zoomBehavior.transform, d3.zoomIdentity);
}

// Re-run path generation against the current projection (assumes scale/translate
// are already correct). Used when only the rotation changes — skipping
// fitProjection avoids scale jitter mid-rotation on clipped projections.
function rerenderProjection() {
  renderBackground();
  renderLand();
  renderStateBorders();
  renderCountryBorders();
  renderArcs();
  renderClusters();
  renderPoints();
  renderArcLabels();
  renderClusterLabels();
}

function renderBackground() {
  sphereEl.attr('d', pathGen({ type: 'Sphere' }) || '');
  const grat = d3.geoGraticule().step([15, 15]);
  gratEl.attr('d', pathGen(grat()) || '');
  gratEqEl.attr('d', pathGen({
    type: 'LineString',
    coordinates: Array.from({length:361}, (_,i) => [i-180, 0])
  }) || '');
}

function renderLand() {
  if (!state.landGeo) { landLayer.selectAll('*').remove(); return; }
  const sel = landLayer.selectAll('path').data(state.landGeo.features || []);
  sel.exit().remove();
  sel.enter().append('path').attr('class','land')
    .merge(sel)
    .attr('d', d => pathGen(d) || '');
  landLayer.attr('display', state.showContinents ? null : 'none');
}

function renderCountryBorders() {
  if (!state.countriesGeo) { countryBorderLayer.selectAll('*').remove(); return; }
  const sel = countryBorderLayer.selectAll('path').data(state.countriesGeo.features || []);
  sel.exit().remove();
  sel.enter().append('path').attr('class','border-country')
    .merge(sel)
    .attr('d', d => pathGen(d) || '');
  countryBorderLayer.attr('display', state.showBorders ? null : 'none');
}

function renderStateBorders() {
  if (!state.statesGeo) { stateBorderLayer.selectAll('*').remove(); return; }
  const sel = stateBorderLayer.selectAll('path').data(state.statesGeo.features || []);
  sel.exit().remove();
  sel.enter().append('path').attr('class','border-state')
    .merge(sel)
    .attr('d', d => pathGen(d) || '');
  stateBorderLayer.attr('display', state.showBorders ? null : 'none');
}

function renderArcs() {
  arcLayer.selectAll('*').remove();
  for (const pair of state.pairs) {
    const a = state.clusters[pair.i].center;
    const b = state.clusters[pair.j].center;
    const line = {
      type: 'LineString',
      coordinates: [[a.lon, a.lat], [b.lon, b.lat]]
    };
    const d = pathGen(line);
    if (!d) continue;
    arcLayer.append('path')
      .attr('class','arc')
      .attr('d', d)
      .datum(pair)
      .on('mousemove', (ev, p) => {
        const ca = state.clusters[p.i], cb = state.clusters[p.j];
        showReadout(ev,
          `${escapeHtml(ca.name)} ↔ ${escapeHtml(cb.name)}`,
          [`great-circle ${formatKm(p.distKm)}`]
        );
      })
      .on('mouseleave', hideReadout);
  }
}

function renderClusters() {
  clusterLayer.selectAll('*').remove();
  state.clusters.forEach((c, idx) => {
    const bufRad = (c.radiusKm + 500) / EARTH_KM * 180 / Math.PI;
    const bufGeo = d3.geoCircle()
      .center([c.center.lon, c.center.lat])
      .radius(bufRad)();
    const bufD = pathGen(bufGeo);
    if (!bufD) return;
    clusterLayer.append('path')
      .attr('class', 'cluster-buffer')
      .attr('d', bufD)
      .datum({ idx })
      .on('mousemove', (ev, d) => {
        const cl = state.clusters[d.idx];
        showReadout(ev, escapeHtml(cl.name), [
          `${cl.points.length} point${cl.points.length>1?'s':''} · radius ${formatKm(cl.radiusKm)}`,
          `buffer ${formatKm(cl.radiusKm + 500)}`,
          `${cl.center.lat.toFixed(3)}°, ${cl.center.lon.toFixed(3)}°`
        ]);
      })
      .on('mouseleave', hideReadout);
  });
}

function renderPoints() {
  pointLayer.selectAll('*').remove();
  for (const p of state.points) {
    const xy = projection([p.lon, p.lat]);
    if (!xy) continue;
    pointLayer.append('circle')
      .attr('class','point-halo')
      .attr('cx', xy[0]).attr('cy', xy[1])
      .attr('r', 6);
    pointLayer.append('circle')
      .attr('class','point-dot')
      .attr('cx', xy[0]).attr('cy', xy[1])
      .attr('r', 3)
      .datum(p)
      .on('mousemove', (ev, d) => {
        const rows = [`${d.lat.toFixed(3)}°, ${d.lon.toFixed(3)}°`];
        const entries = Object.entries(d.tags || {})
          .sort(([a], [b]) => a.localeCompare(b));
        if (entries.length) {
          rows.push('<div class="kv">' + entries.map(([k, v]) =>
            `<span class="k">${escapeHtml(k)}</span><span class="v">${escapeHtml(v)}</span>`
          ).join('') + '</div>');
        }
        showReadout(ev, escapeHtml(d.name), rows);
      })
      .on('mouseleave', hideReadout);
  }
}

function renderClusterLabels() {
  clusterLabelLayer.selectAll('*').remove();
  if (!state.showRegionLabels) return;
  const k = d3.zoomTransform(svg.node()).k;
  for (const c of state.clusters) {
    const xy = projection([c.center.lon, c.center.lat]);
    if (!xy || !isFinite(xy[0]) || !isFinite(xy[1])) continue;
    clusterLabelLayer.append('text')
      .attr('class', 'cluster-label')
      .attr('x', xy[0])
      .attr('y', xy[1])
      .attr('dy', '1.1em')
      .style('font-size', (10 / k) + 'px')
      .text(c.name);
  }
}

function renderArcLabels() {
  arcLabelLayer.selectAll('*').remove();
  if (!state.showDistances) return;
  const k = d3.zoomTransform(svg.node()).k;
  for (const pair of state.pairs) {
    const a = state.clusters[pair.i].center;
    const b = state.clusters[pair.j].center;
    const mid = geoMidpoint(a, b);
    const xy = projection([mid.lon, mid.lat]);
    if (!xy) continue;
    arcLabelLayer.append('text')
      .attr('class','arc-label')
      .attr('x', xy[0]).attr('y', xy[1] - 2)
      .style('font-size', (9 / k) + 'px')
      .text(formatKm(pair.distKm));
  }
}

/* ---------- READOUT ---------- */
function showReadout(ev, name, rows) {
  readout.innerHTML = `<div class="name">${name}</div>` +
    (rows||[]).map(r => `<div class="row">${r}</div>`).join('');
  readout.style.left = ev.clientX + 'px';
  readout.style.top  = ev.clientY + 'px';
  readout.classList.add('show');
}
function hideReadout() { readout.classList.remove('show'); }

/* ---------- FILE INGEST ---------- */
function readAsText(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload  = () => resolve(r.result);
    r.onerror = () => reject(new Error('read failed'));
    r.readAsText(file);
  });
}
async function ingestFiles(fileList) {
  const files = Array.from(fileList || []);
  if (!files.length) return;
  let totalAdded = 0;
  const errors = [];
  for (const f of files) {
    try {
      const text = await readAsText(f);
      const json = JSON.parse(text);
      const incoming = parseSource(json);
      if (!incoming.length) { errors.push(f.name); continue; }
      // Store parsed points with the source so we can remove it later
      loadedFiles.push({ name: f.name, points: incoming });
      totalAdded += incoming.length;
    } catch(e) {
      errors.push(f.name);
    }
  }
  recomputeFromSources();
  rebuildClusters();
  renderAll();
  updatePanel();
  const errSuffix = errors.length ? ` · ${errors.length} ERR` : '';
  const fileWord = files.length > 1 ? `${files.length} files` : '1 file';
  showToast(`+${totalAdded} · ${fileWord}${errSuffix} · ${state.points.length} points · ${state.clusters.length} regions`);
}

function recomputeFromSources() {
  state.points = [];
  const seen = new Set();
  for (const f of loadedFiles) {
    for (const p of f.points) {
      const k = `${p.lat.toFixed(5)},${p.lon.toFixed(5)}`;
      if (seen.has(k)) continue;
      seen.add(k);
      state.points.push(p);
    }
  }
}

function removeSource(idx) {
  if (idx < 0 || idx >= loadedFiles.length) return;
  const removed = loadedFiles.splice(idx, 1)[0];
  recomputeFromSources();
  rebuildClusters();
  renderAll();
  updatePanel();
  showToast(`removed ${removed.name} · ${state.points.length} points · ${state.clusters.length} regions`);
}

/* ---------- DROPZONE ---------- */
const drop = document.getElementById('drop');
const fileInput = document.getElementById('file');
drop.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => {
  ingestFiles(e.target.files);
  e.target.value = '';
});
;['dragenter','dragover'].forEach(ev =>
  drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('over'); }));
;['dragleave','drop'].forEach(ev =>
  drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('over'); }));
drop.addEventListener('drop', e => ingestFiles(e.dataTransfer.files));

/* ---------- PANEL UPDATE ---------- */
function updatePanel() {
  const fl = document.getElementById('loaded-files');
  fl.innerHTML = '';
  if (loadedFiles.length) {
    const header = document.createElement('div');
    header.className = 'sources-header';
    header.textContent = 'Sources';
    fl.appendChild(header);
    loadedFiles.forEach((f, idx) => {
      const row = document.createElement('div');
      row.className = 'source-row';
      const name = document.createElement('span');
      name.className = 'source-name';
      name.textContent = f.name;
      name.title = f.name;
      const count = document.createElement('span');
      count.className = 'source-count';
      count.textContent = f.points.length;
      const del = document.createElement('button');
      del.className = 'source-del';
      del.title = `Remove ${f.name}`;
      del.setAttribute('aria-label', `Remove ${f.name}`);
      del.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path></svg>`;
      del.addEventListener('click', () => removeSource(idx));
      row.appendChild(name);
      row.appendChild(count);
      row.appendChild(del);
      fl.appendChild(row);
    });
  }

  document.getElementById('region-count').textContent = state.clusters.length;
  const list = document.getElementById('cluster-list');
  if (!state.clusters.length) { list.innerHTML = '<div class="empty">no regions</div>'; return; }
  list.innerHTML = '';
  state.clusters.forEach((c, idx) => {
    const div = document.createElement('div');
    div.className = 'cluster-item';
    div.innerHTML = `
      <div class="num">${String(idx+1).padStart(2,'0')}</div>
      <div class="meta">
        <div><span class="cluster-name" contenteditable="true" spellcheck="false">${escapeHtml(c.name)}</span></div>
        <div class="coord">${c.center.lat.toFixed(2)}°, ${c.center.lon.toFixed(2)}°</div>
      </div>
      <div class="count">${c.points.length}</div>
    `;
    const nameEl = div.querySelector('.cluster-name');
    // Don't trigger zoom when clicking the editable name
    ['mousedown','click'].forEach(ev =>
      nameEl.addEventListener(ev, e => e.stopPropagation()));
    nameEl.addEventListener('blur', () => {
      const v = nameEl.textContent.replace(/\s+/g, ' ').trim();
      const next = v || c.name;
      nameEl.textContent = next;
      c.name = next;
      renderClusterLabels();
    });
    nameEl.addEventListener('keydown', e => {
      if (e.key === 'Enter')      { e.preventDefault(); nameEl.blur(); }
      else if (e.key === 'Escape'){ e.preventDefault(); nameEl.textContent = c.name; nameEl.blur(); }
    });
    div.addEventListener('click', () => zoomToCluster(c));
    list.appendChild(div);
  });
}

function zoomToCluster(cluster) {
  const xy = projection([cluster.center.lon, cluster.center.lat]);
  if (!xy) return;
  const k = 4;
  const w = mapContainer.clientWidth || innerWidth;
  const h = mapContainer.clientHeight || innerHeight;
  const transform = d3.zoomIdentity
    .translate(w/2 - xy[0]*k, h/2 - xy[1]*k)
    .scale(k);
  svg.transition().duration(600).call(zoomBehavior.transform, transform);
}

/* ---------- TOAST ---------- */
let toastTimer;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toastEl.classList.remove('show'), 2400);
}

/* ---------- TOGGLES ---------- */
document.getElementById('t-distances').addEventListener('click', e => {
  state.showDistances = !state.showDistances;
  e.currentTarget.classList.toggle('on', state.showDistances);
  arcLayer.attr('display', state.showDistances ? null : 'none');
  arcLabelLayer.attr('display', state.showDistances ? null : 'none');
});
document.getElementById('t-region-labels').addEventListener('click', e => {
  state.showRegionLabels = !state.showRegionLabels;
  e.currentTarget.classList.toggle('on', state.showRegionLabels);
  renderClusterLabels();
});
document.getElementById('t-continents').addEventListener('click', e => {
  state.showContinents = !state.showContinents;
  e.currentTarget.classList.toggle('on', state.showContinents);
  landLayer.attr('display', state.showContinents ? null : 'none');
});
document.getElementById('t-borders').addEventListener('click', e => {
  state.showBorders = !state.showBorders;
  e.currentTarget.classList.toggle('on', state.showBorders);
  countryBorderLayer.attr('display', state.showBorders ? null : 'none');
  stateBorderLayer.attr('display', state.showBorders ? null : 'none');
});

/* ---------- PROJECTION SWITCH ---------- */
(function populateProjectionSelect() {
  const sel = document.getElementById('proj-select');
  PROJECTION_GROUPS.forEach(g => {
    // Filter to only projections actually exported on the d3 namespace
    const available = g.items.filter(([key]) => typeof d3[key] === 'function');
    if (!available.length) return;
    const og = document.createElement('optgroup');
    og.label = g.group;
    available.forEach(([key, name]) => {
      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = name;
      if (key === state.projectionName) opt.selected = true;
      og.appendChild(opt);
    });
    sel.appendChild(og);
  });
  sel.addEventListener('change', () => {
    adoptProjection(sel.value);
    syncRotationControls();
    renderAll();
    // Reset zoom on projection change so user sees the full new map
    svg.call(zoomBehavior.transform, d3.zoomIdentity);
  });

  const stepProjection = (delta) => {
    const opts = Array.from(sel.options);
    if (!opts.length) return;
    const i = opts.findIndex(o => o.value === sel.value);
    const next = delta === 'random'
      ? Math.floor(Math.random() * opts.length)
      : (i + delta + opts.length) % opts.length;
    sel.value = opts[next].value;
    sel.dispatchEvent(new Event('change'));
  };
  document.getElementById('proj-prev').addEventListener('click', () => stepProjection(-1));
  document.getElementById('proj-next').addEventListener('click', () => stepProjection(1));
  document.getElementById('proj-rand').addEventListener('click', () => stepProjection('random'));
})();

/* ---------- RESIZE ---------- */
let resizeTimer;
addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => renderAll(), 120);
});

/* ---------- BOOT ---------- */
async function boot() {
  renderAll();
  updatePanel();
  loadGeo();
  setTimeout(() => showToast('READY · LOAD OVERPASS EXPORT'), 600);
}
boot();

})();  // end main IIFE
</script>
